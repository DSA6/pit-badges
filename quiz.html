<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Safety Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amazon Ember', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 700px; margin: 0 auto; background: white;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white; padding: 30px 20px; text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .content { padding: 30px; }
        .quiz-intro { text-align: center; margin-bottom: 30px; }
        .quiz-intro h2 { color: #232f3e; margin-bottom: 15px; }
        .quiz-intro p { color: #666; line-height: 1.6; }
        .question { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .question h3 { color: #232f3e; margin-bottom: 15px; font-size: 18px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            padding: 15px; background: white; border: 2px solid #e0e0e0;
            border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        .option:hover { border-color: #2196F3; background: #f0f8ff; }
        .option.selected { border-color: #2196F3; background: #e3f2fd; }
        .button {
            padding: 12px 30px; background: #2196F3; color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .button:hover { background: #1976D2; }
        .button:disabled { background: #ccc; cursor: not-allowed; }
        .result-container { display: none; text-align: center; }
        .result-container.show { display: block; }
        .score { font-size: 48px; font-weight: bold; color: #2196F3; margin: 20px 0; }
        .award { font-size: 80px; margin: 20px 0; }
        .award-text { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .progress { background: #e0e0e0; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: #2196F3; height: 100%; transition: width 0.3s; }
        /* Set selector */
        .set-list { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .set-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px;
            cursor: pointer; transition: all 0.3s;
        }
        .set-item:hover { border-color: #2196F3; background: #f0f8ff; }
        .set-item.completed { border-color: #4CAF50; background: #e8f5e9; cursor: default; }
        .set-item.locked { border-color: #e0e0e0; background: #f5f5f5; cursor: not-allowed; opacity: 0.6; }
        .set-item.active { border-color: #2196F3; background: #e3f2fd; }
        .set-item .set-info { display: flex; flex-direction: column; }
        .set-item .set-name { font-weight: bold; color: #232f3e; font-size: 15px; }
        .set-item .set-status { font-size: 12px; color: #666; margin-top: 3px; }
        .set-item .set-badge { font-size: 24px; }
        .practice-note {
            background: #fff3cd; padding: 12px; border-radius: 8px;
            border-left: 4px solid #ffc107; margin-bottom: 15px; font-size: 13px; color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 PIT Safety Quiz</h1>
            <p id="headerSubtitle">Select a Quiz Set</p>
        </div>
        <div class="content">
            <!-- Set Selector -->
            <div id="setSelector">
                <div class="quiz-intro">
                    <h2>Quiz Sets</h2>
                    <p>Complete each set to unlock the next one. Score 80%+ to pass.</p>
                </div>
                <div id="practiceNote" class="practice-note" style="display:none;">
                    All sets completed! You can practice any set again, but no new awards will be given.
                </div>
                <div class="set-list" id="setList"></div>
                <br>
                <button class="button" onclick="window.close()" style="background:#666;">Close</button>
            </div>

            <!-- Quiz Intro -->
            <div id="quizIntro" style="display:none;" class="quiz-intro">
                <h2 id="introTitle"></h2>
                <p id="introDesc"></p>
                <br>
                <button class="button" onclick="startQuiz()">Start Quiz</button>
            </div>

            <!-- Progress Bar -->
            <div id="progressContainer" style="display:none;">
                <div class="progress"><div id="progressBar" class="progress-bar" style="width:0%"></div></div>
                <p style="text-align:center;color:#666;margin-bottom:20px;">
                    Question <span id="currentQuestion">1</span> of <span id="totalQuestions">10</span>
                </p>
            </div>
            <div id="questionsContainer"></div>

            <!-- Result -->
            <div id="resultContainer" class="result-container">
                <h2>Quiz Complete!</h2>
                <div class="score" id="finalScore">0%</div>
                <div class="award" id="awardBadge"></div>
                <div class="award-text" id="awardText"></div>
                <p id="resultMessage"></p>
                <br>
                <button class="button" onclick="restartQuiz()" id="tryAgainBtn">Try Again</button>
                <button class="button" onclick="backToSets()" style="background:#666;margin-left:10px;">Back to Sets</button>
            </div>
        </div>
    </div>
    <script>
    // Get login from URL param
    const urlParams = new URLSearchParams(window.location.search);
    const userLogin = urlParams.get('login') || 'unknown';

    // All quiz sets - Set 1 has questions, Sets 2-10 are placeholders

        },
        {

    let currentSetIndex = -1;
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedAnswers = [];
    let isPracticeMode = false;

    function getAwards() {
        return JSON.parse(localStorage.getItem('pitQuizAwards_' + userLogin) || '{}');
    }

    function saveAward(setId, setName, scorePercent) {
        const awards = getAwards();
        awards[setId] = {
            award: scorePercent >= 90 ? '🏆' : '🥈',
            score: scorePercent,
            setName: setName,
            date: new Date().toLocaleDateString()
        };
        localStorage.setItem('pitQuizAwards_' + userLogin, JSON.stringify(awards));
    }

    function getCompletedCount() {
        const awards = getAwards();
        let count = 0;
        allSets.forEach(function(s) { if (awards[s.id]) count++; });
        return count;
    }

    function renderSetSelector() {
        const awards = getAwards();
        const completedCount = getCompletedCount();
        const totalWithQuestions = allSets.filter(function(s) { return s.questions.length > 0; }).length;
        isPracticeMode = completedCount >= totalWithQuestions && totalWithQuestions > 0;
        document.getElementById('practiceNote').style.display = isPracticeMode ? 'block' : 'none';

        const list = document.getElementById('setList');
        list.innerHTML = '';
        let foundNextAvailable = false;

        allSets.forEach(function(set, idx) {
            const isCompleted = !!awards[set.id];
            const hasQuestions = set.questions.length > 0;
            let status, badge, cls;

            if (isCompleted) {
                status = 'Passed (' + awards[set.id].score + '%)';
                badge = awards[set.id].award;
                cls = 'completed';
            } else if (!hasQuestions) {
                status = 'Coming soon';
                badge = '🔒';
                cls = 'locked';
            } else if (isPracticeMode) {
                status = 'Practice mode';
                badge = '🔄';
                cls = 'active';
            } else if (!foundNextAvailable) {
                status = 'Available';
                badge = '▶️';
                cls = 'active';
                foundNextAvailable = true;
            } else {
                status = 'Locked';
                badge = '🔒';
                cls = 'locked';
            }

            var div = document.createElement('div');
            div.className = 'set-item ' + cls;
            div.innerHTML = '<div class="set-info"><span class="set-name">' + set.name + '</span>' +
                '<span class="set-status">' + status + '</span></div>' +
                '<span class="set-badge">' + badge + '</span>';

            if (cls === 'active' || (cls === 'completed' && isPracticeMode)) {
                div.onclick = (function(i) { return function() { selectSet(i); }; })(idx);
                div.style.cursor = 'pointer';
            }
            list.appendChild(div);
        });
    }

    function selectSet(idx) {
        currentSetIndex = idx;
        var set = allSets[idx];
        document.getElementById('setSelector').style.display = 'none';
        document.getElementById('quizIntro').style.display = 'block';
        document.getElementById('introTitle').textContent = set.name;
        var desc = set.description;
        if (isPracticeMode) desc += '\n\nPractice Mode - no new awards will be given.';
        document.getElementById('introDesc').textContent = desc;
        document.getElementById('headerSubtitle').textContent = set.name;
    }

    function startQuiz() {
        currentQuestionIndex = 0; score = 0; selectedAnswers = [];
        document.getElementById('quizIntro').style.display = 'none';
        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('totalQuestions').textContent = allSets[currentSetIndex].questions.length;
        showQuestion();
    }

    function showQuestion() {
        var set = allSets[currentSetIndex];
        var q = set.questions[currentQuestionIndex];
        var total = set.questions.length;
        document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
        document.getElementById('progressBar').style.width = ((currentQuestionIndex / total) * 100) + '%';
        var container = document.getElementById('questionsContainer');
        var html = '<div class="question"><h3>Q' + (currentQuestionIndex + 1) + '. ' + q.q + '</h3><div class="options">';
        q.options.forEach(function(opt, i) {
            html += '<div class="option" onclick="selectOption(' + i + ')" id="opt' + i + '">' + opt + '</div>';
        });
        html += '</div></div><button class="button" id="nextBtn" onclick="nextQuestion()" disabled>Next</button>';
        container.innerHTML = html;
    }

    function selectOption(idx) {
        document.querySelectorAll('.option').forEach(function(el) { el.classList.remove('selected'); });
        document.getElementById('opt' + idx).classList.add('selected');
        selectedAnswers[currentQuestionIndex] = idx;
        document.getElementById('nextBtn').disabled = false;
    }

    function nextQuestion() {
        var set = allSets[currentSetIndex];
        if (selectedAnswers[currentQuestionIndex] === set.questions[currentQuestionIndex].answer) score++;
        currentQuestionIndex++;
        if (currentQuestionIndex < set.questions.length) showQuestion();
        else showResults();
    }

    function showResults() {
        var set = allSets[currentSetIndex];
        var total = set.questions.length;
        var pct = Math.round((score / total) * 100);
        var passed = pct >= 80;

        document.getElementById('progressContainer').style.display = 'none';
        document.getElementById('questionsContainer').innerHTML = '';
        document.getElementById('resultContainer').classList.add('show');
        document.getElementById('finalScore').textContent = pct + '%';

        var awardBadge = document.getElementById('awardBadge');
        var awardText = document.getElementById('awardText');
        var resultMsg = document.getElementById('resultMessage');
        var tryAgainBtn = document.getElementById('tryAgainBtn');

        if (passed) {
            if (pct >= 90) {
                awardBadge.textContent = '🏆'; awardText.textContent = 'Gold Award!'; awardText.style.color = '#FFD700';
            } else {
                awardBadge.textContent = '🥈'; awardText.textContent = 'Silver Award!'; awardText.style.color = '#C0C0C0';
            }
            if (isPracticeMode) {
                resultMsg.textContent = 'Great job! (Practice mode - no new award saved)';
                tryAgainBtn.style.display = 'inline-block';
            } else {
                saveAward(set.id, set.name, pct);
                resultMsg.textContent = 'Congratulations! Award saved to your badge.';
                tryAgainBtn.style.display = 'none';
            }
        } else {
            awardBadge.textContent = '😔'; awardText.textContent = 'Not Passed'; awardText.style.color = '#666';
            resultMsg.textContent = 'You need 80% to pass. Score: ' + score + '/' + total;
            tryAgainBtn.style.display = 'inline-block';
        }
    }

    function restartQuiz() {
        document.getElementById('resultContainer').classList.remove('show');
        startQuiz();
    }

    function backToSets() {
        document.getElementById('resultContainer').classList.remove('show');
        document.getElementById('progressContainer').style.display = 'none';
        document.getElementById('questionsContainer').innerHTML = '';
        document.getElementById('quizIntro').style.display = 'none';
        document.getElementById('setSelector').style.display = 'block';
        document.getElementById('headerSubtitle').textContent = 'Select a Quiz Set';
        renderSetSelector();
    }

    renderSetSelector();
    </script>
